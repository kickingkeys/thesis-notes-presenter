<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Thesis Notes">
  <meta name="theme-color" content="#1a1612">
  <title>Thesis Notes</title>
  <style>
    :root {
      --bg: #1a1612;
      --bg-deep: #100c08;
      --ink: #f4ede0;
      --ink-soft: #a89880;
      --ink-dim: #5a4832;
      --accent: #ED682B;
      --green: #6fb389;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Charter', 'Georgia', 'Times New Roman', serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ─── start screen ─── */
    #start {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 100;
      padding: 4vh 4vw;
      gap: 4vh;
    }
    #start.hidden { display: none; }
    .start-title {
      font-family: 'Charter', 'Georgia', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-style: italic;
      letter-spacing: -0.01em;
      text-align: center;
    }
    .start-sub {
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      font-size: clamp(0.75rem, 1.4vw, 1rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-align: center;
    }
    .start-count {
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      font-size: clamp(0.75rem, 1.3vw, 0.95rem);
      color: var(--ink-dim);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .play-btn {
      margin-top: 2vh;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 1.1em 2.6em;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 120ms ease-out, opacity 120ms;
    }
    .play-btn:active { transform: scale(0.97); opacity: 0.85; }
    .start-hint {
      margin-top: 3vh;
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      font-size: clamp(0.65rem, 1.1vw, 0.85rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-dim);
      text-align: center;
      line-height: 1.8;
    }

    /* ─── stage ─── */
    #stage {
      position: relative;
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7vh 6vw 6vh;
    }

    /* note text */
    #note {
      max-width: 56rem;
      width: 100%;
      max-height: 100%;
      overflow-y: auto;
      font-size: clamp(1.25rem, 2.4vw, 2rem);
      line-height: 1.5;
      letter-spacing: -0.005em;
      text-align: left;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    #note p {
      margin: 0 0 0.95em 0;
    }
    #note p:last-child { margin-bottom: 0; }
    #note p.bullet {
      padding-left: 1.2em;
      position: relative;
    }

    /* ─── HUD (top right) ─── */
    .hud {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 1.4vh);
      right: calc(env(safe-area-inset-right) + 2vw);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3em;
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      pointer-events: none;
      z-index: 50;
    }
    .hud.hidden { display: none; }
    #timer {
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      transition: color 250ms;
    }
    #timer.warn { color: var(--accent); }
    #counter {
      font-size: clamp(0.7rem, 1.15vw, 0.85rem);
      letter-spacing: 0.18em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    /* ─── tap zones ─── */
    .tap-zone {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 50%;
      cursor: pointer;
      z-index: 10;
      background: transparent;
    }
    .tap-zone.left { left: 0; }
    .tap-zone.right { right: 0; }
    .tap-zone.hidden { display: none; }

    /* edge feedback flash on tap */
    .edge-flash {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 6vw;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 180ms ease-out;
    }
    .edge-flash.left {
      left: 0;
      background: linear-gradient(to right, rgba(237, 104, 43, 0.18), transparent);
    }
    .edge-flash.right {
      right: 0;
      background: linear-gradient(to left, rgba(237, 104, 43, 0.18), transparent);
    }
    .edge-flash.show { opacity: 1; }

    /* corner reset hint */
    #reset-zone {
      position: fixed;
      top: 0;
      left: 0;
      width: 14vw;
      height: 6vh;
      z-index: 30;
      cursor: pointer;
      background: transparent;
    }
    #reset-zone.hidden { display: none; }

    /* progress bar at very bottom */
    #progress {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      z-index: 40;
      pointer-events: none;
    }
    #progress.hidden { display: none; }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 220ms ease-out;
    }
  </style>
</head>
<body>

  <!-- start screen -->
  <div id="start">
    <div class="start-sub" id="start-sub">Surya Narreddi · ITP Thesis</div>
    <div class="start-title" id="start-title">Thesis Notes</div>
    <div class="start-count" id="start-count">— notes</div>
    <button class="play-btn" id="play-btn">Play</button>
    <div class="start-hint">
      Tap right to advance · tap left to go back<br>
      Top-left corner long-press to reset
    </div>
  </div>

  <!-- stage -->
  <div id="stage">
    <div id="note"></div>
  </div>

  <!-- HUD -->
  <div class="hud hidden" id="hud">
    <div id="timer">00:00</div>
    <div id="counter">— / —</div>
  </div>

  <!-- tap zones -->
  <div class="tap-zone left hidden" id="tap-left"></div>
  <div class="tap-zone right hidden" id="tap-right"></div>

  <!-- edge feedback -->
  <div class="edge-flash left" id="flash-left"></div>
  <div class="edge-flash right" id="flash-right"></div>

  <!-- corner reset (long-press) -->
  <div id="reset-zone" class="hidden"></div>

  <!-- progress -->
  <div id="progress" class="hidden">
    <div id="progress-fill"></div>
  </div>

  <script>
  (function () {
    const STORAGE_KEY = 'thesis_notes_state_v1';
    const WARN_AT_MS = 10 * 60 * 1000; // 10 minutes

    let notes = [];
    let title = 'Thesis Notes';
    let subtitle = '';
    let idx = 0;
    let started = false;
    let startTime = null;
    let tickInterval = null;

    const $ = (id) => document.getElementById(id);
    const startEl = $('start');
    const startTitleEl = $('start-title');
    const startSubEl = $('start-sub');
    const startCountEl = $('start-count');
    const playBtn = $('play-btn');
    const noteEl = $('note');
    const hudEl = $('hud');
    const timerEl = $('timer');
    const counterEl = $('counter');
    const tapLeft = $('tap-left');
    const tapRight = $('tap-right');
    const flashLeft = $('flash-left');
    const flashRight = $('flash-right');
    const resetZone = $('reset-zone');
    const progressEl = $('progress');
    const progressFill = $('progress-fill');

    /* ─── state persistence ─── */
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          idx, started, startTime, ts: Date.now()
        }));
      } catch (e) {}
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) { return null; }
    }
    function clearState() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    }

    /* ─── render ─── */
    function renderNote() {
      const text = notes[idx] || '';
      // split on \n\n into paragraphs; lines starting with "·" become bullets
      const paragraphs = text.split(/\n\n+/);
      noteEl.innerHTML = '';
      paragraphs.forEach(p => {
        const lines = p.split(/\n/);
        lines.forEach(line => {
          const trimmed = line.trim();
          if (!trimmed) return;
          const el = document.createElement('p');
          if (trimmed.startsWith('·') || trimmed.startsWith('- ') || trimmed.startsWith('• ')) {
            el.className = 'bullet';
            el.textContent = trimmed.replace(/^[·\-•]\s*/, '· ');
          } else {
            el.textContent = trimmed;
          }
          noteEl.appendChild(el);
        });
      });
      noteEl.scrollTop = 0;
      counterEl.textContent = `${String(idx + 1).padStart(2, '0')} / ${String(notes.length).padStart(2, '0')}`;
      const pct = ((idx + 1) / notes.length) * 100;
      progressFill.style.width = pct + '%';
    }

    /* ─── timer ─── */
    function fmtTime(ms) {
      const total = Math.floor(ms / 1000);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      const pad = n => String(n).padStart(2, '0');
      return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
    }
    function tickTimer() {
      if (!startTime) return;
      const elapsed = Date.now() - startTime;
      timerEl.textContent = fmtTime(elapsed);
      if (elapsed >= WARN_AT_MS) timerEl.classList.add('warn');
      else timerEl.classList.remove('warn');
    }
    function startTimer() {
      if (!startTime) startTime = Date.now();
      if (tickInterval) clearInterval(tickInterval);
      tickInterval = setInterval(tickTimer, 500);
      tickTimer();
    }

    /* ─── navigation ─── */
    function go(delta) {
      const next = idx + delta;
      if (next < 0 || next >= notes.length) return;
      idx = next;
      renderNote();
      saveState();
    }

    function flash(side) {
      const el = side === 'left' ? flashLeft : flashRight;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 200);
    }

    /* ─── start sequence ─── */
    function showRunningUI() {
      startEl.classList.add('hidden');
      hudEl.classList.remove('hidden');
      tapLeft.classList.remove('hidden');
      tapRight.classList.remove('hidden');
      resetZone.classList.remove('hidden');
      progressEl.classList.remove('hidden');
    }
    function showStartUI() {
      startEl.classList.remove('hidden');
      hudEl.classList.add('hidden');
      tapLeft.classList.add('hidden');
      tapRight.classList.add('hidden');
      resetZone.classList.add('hidden');
      progressEl.classList.add('hidden');
    }

    function startPresentation() {
      started = true;
      if (!startTime) startTime = Date.now();
      requestFullscreen();
      showRunningUI();
      startTimer();
      renderNote();
      saveState();
    }

    function requestFullscreen() {
      const el = document.documentElement;
      const fn = el.requestFullscreen
        || el.webkitRequestFullscreen
        || el.mozRequestFullScreen
        || el.msRequestFullscreen;
      if (fn) {
        try { fn.call(el); } catch (e) {}
      }
    }

    function resetAll() {
      idx = 0;
      started = false;
      startTime = null;
      if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
      timerEl.textContent = '00:00';
      timerEl.classList.remove('warn');
      clearState();
      showStartUI();
    }

    /* ─── reset long-press ─── */
    let resetTimer = null;
    resetZone.addEventListener('pointerdown', e => {
      resetTimer = setTimeout(() => {
        if (confirm('Reset to the start? Timer will be cleared.')) resetAll();
      }, 800);
    });
    ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev =>
      resetZone.addEventListener(ev, () => { if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; } })
    );

    /* ─── input ─── */
    tapLeft.addEventListener('click', () => { flash('left'); go(-1); });
    tapRight.addEventListener('click', () => { flash('right'); go(+1); });

    document.addEventListener('keydown', e => {
      if (!started) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          startPresentation();
        }
        return;
      }
      if (['ArrowRight', 'ArrowDown', ' ', 'PageDown', 'l'].includes(e.key)) {
        e.preventDefault();
        flash('right');
        go(+1);
      } else if (['ArrowLeft', 'ArrowUp', 'PageUp', 'h'].includes(e.key)) {
        e.preventDefault();
        flash('left');
        go(-1);
      } else if (e.key === 'r' && (e.metaKey || e.ctrlKey)) {
        // let browser reload
      } else if (e.key === 'Escape') {
        // browser exits fullscreen on its own
      }
    });

    playBtn.addEventListener('click', startPresentation);

    /* ─── boot ─── */
    async function boot() {
      try {
        const res = await fetch('notes.json', { cache: 'no-store' });
        const data = await res.json();
        notes = data.notes || [];
        title = data.title || title;
        subtitle = data.subtitle || subtitle;
        startTitleEl.textContent = title;
        startSubEl.textContent = subtitle || '';
        startCountEl.textContent = `${notes.length} notes`;
      } catch (e) {
        startTitleEl.textContent = 'Failed to load notes';
        startCountEl.textContent = e.message || 'check notes.json';
        playBtn.disabled = true;
        playBtn.style.opacity = 0.4;
        return;
      }

      // restore state
      const saved = loadState();
      if (saved && saved.started && typeof saved.idx === 'number') {
        idx = Math.max(0, Math.min(notes.length - 1, saved.idx));
        startTime = saved.startTime || Date.now();
        started = true;
        showRunningUI();
        startTimer();
        renderNote();
      } else {
        idx = 0;
        showStartUI();
      }
    }

    boot();
  })();
  </script>
</body>
</html>
